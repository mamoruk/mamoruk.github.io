<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR全景缓存版</title>
    <link rel="stylesheet" href="js/pannellum.css"/>
    <script type="text/javascript" src="js/pannellum.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #panorama { width: 100%; height: 100%; }
        
        .control {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: rgba(255,255,255,0.92);
            padding: 8px 12px;
            border-radius: 10px;
        }
        select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #bbb;
            font-size: 16px;
        }
    </style>
</head>

<body>
<div class="control">
    <select id="panoSelect">
    <option value="104a/104a-1.jpg">厨房&玄关</option>
    <option value="104a/104a-2.jpg">客厅</option>
    <option value="104a/104a-3.jpg">阳台</option>
    <option value="104a/104a-4.jpg">南次卧</option>
    <option value="104a/104a-5.jpg">北次卧</option>
    <option value="104a/104a-6.jpg">主卧</option>
    </select>
</div>
<div id="panorama"></div>

<script>
// ============================
//  修复版：缓存 + 秒切 + 不掉帧
// ============================
let viewer;
const imageList = ["104a-1.jpg", "104a-2.jpg", "104a-3.jpg", "104a-4.jpg", "104a-5.jpg", "104a-6.jpg"];
const cache = {}; // 本地缓存

// 预加载所有图片（浏览器永久缓存）
function preload() {
  imageList.forEach(src => {
    const img = new Image();
    img.src = src;
    cache[src] = true;
  });
}

// 安全加载全景（不会卡死、不会无响应）
function loadPanorama(src) {
  try {
    if (viewer) viewer.destroy();

    viewer = pannellum.viewer('panorama', {
      type: "equirectangular",
      panorama: src,
      autoLoad: true,
      showVRButton: true,
      compass: true,
      showZoomCtrl: true,
      showFullscreenCtrl: true
    });
  } catch (e) {}
}

// 切换事件（正常响应）
document.getElementById('panoSelect').addEventListener('change', function () {
  loadPanorama(this.value);
});

// 启动
window.onload = () => {
  preload();        // 预加载所有图片
  loadPanorama("104a/104a-1.jpg");
};
</script>
</body>
</html>
